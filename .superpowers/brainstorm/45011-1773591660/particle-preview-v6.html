<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Hex Preview v6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #070b11;
    font-family: "SF Pro Display", "Segoe UI", "Helvetica Neue", sans-serif;
    overflow: hidden;
  }

  /* Real site as background */
  iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 0;
    pointer-events: none;
  }

  /* Particle canvas sits above the real site */
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    opacity: 0.55;
  }

  /* Controls */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,11,17,0.92); backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(116,151,199,0.14);
    padding: 9px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .top-bar-title { font-size: 13px; font-weight: 600; color: #f4f8ff; }
  .top-bar-sub   { font-size: 11px; color: #607089; margin-top: 1px; }
  .controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .cg { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #9fb0c9; }
  input[type=range] { padding: 0; width: 70px; accent-color: #63b3ff; cursor: pointer; }
  span.val { min-width: 28px; display: inline-block; color: #f4f8ff; font-size: 12px; }
</style>
</head>
<body>

<!-- Real site background — exact localhost:3000 -->
<iframe src="http://localhost:3000" scrolling="no" tabindex="-1"></iframe>

<!-- Particle canvas on top -->
<canvas id="c"></canvas>

<div class="top-bar">
  <div>
    <div class="top-bar-title">Hex particles over real site — localhost:3000</div>
    <div class="top-bar-sub">Orange = exact #f08a24 · Canvas opacity controls blending</div>
  </div>
  <div class="controls">
    <div class="cg">
      <label>Canvas opacity</label>
      <input type="range" id="slOpacity" min="10" max="90" value="55" oninput="setOpacity()">
      <span class="val" id="lblOpacity">0.55</span>
    </div>
    <div class="cg">
      <label>Lines</label>
      <input type="range" id="slCount" min="30" max="160" value="80" oninput="rebuild()">
      <span class="val" id="lblCount">80</span>
    </div>
    <div class="cg">
      <label>Glow</label>
      <input type="range" id="slGlow" min="1" max="12" value="3" oninput="rebuild()">
      <span class="val" id="lblGlow">3</span>
    </div>
    <div class="cg">
      <label>Fade</label>
      <input type="range" id="slFade" min="2" max="14" value="5" oninput="rebuild()">
      <span class="val" id="lblFade">5</span>
    </div>
    <div class="cg">
      <label>Speed</label>
      <input type="range" id="slSpeed" min="5" max="25" value="13" oninput="rebuild()">
      <span class="val" id="lblSpeed">13</span>
    </div>
  </div>
</div>

<script>
var c   = document.getElementById('c');
var ctx = c.getContext('2d');
var w, h, dieX, dieY;

var opts = {
  len:            20,
  count:          80,
  baseTime:       12,
  addedTime:      12,
  dieChance:      0.01,
  spawnChance:    1,
  sparkChance:    0.06,
  sparkDist:      8,
  sparkSize:      2,
  shadowMult:     3,
  repaintAlpha:   0.05,
  baseLightMult:  0.01,
  addedLightMult: 0.02,
};

// exact site tokens
// --accent:            #63b3ff → hsl(210, 100%, 69%)
// --accent-secondary:  #f08a24 → hsl(32,   87%,  54%)
var COLORS = [
  { hue: 210, sat: 100, baseLight: 69, addedLight: 10 },  // blue
  { hue:  32, sat:  87, baseLight: 54, addedLight:  8 },  // orange  ← exact #f08a24
];

var tick  = 0;
var lines = [];
var baseRad = Math.PI * 2 / 6;

function resize() {
  w = c.width  = window.innerWidth;
  h = c.height = window.innerHeight;
  dieX = w / 2 / opts.len;
  dieY = h / 2 / opts.len;
  ctx.fillStyle = 'rgb(7,11,17)';
  ctx.fillRect(0, 0, w, h);
}

function Line() { this.reset(); }

Line.prototype.reset = function() {
  this.x = 0; this.y = 0;
  this.addedX = 0; this.addedY = 0;
  this.rad = 0;
  this.color = COLORS[Math.random() < 0.55 ? 0 : 1];
  this.lightMult = opts.baseLightMult + opts.addedLightMult * Math.random();
  this.cumulativeTime = 0;
  this.beginPhase();
};

Line.prototype.beginPhase = function() {
  this.x += this.addedX;
  this.y += this.addedY;
  this.time = 0;
  this.targetTime = (opts.baseTime + opts.addedTime * Math.random()) | 0;
  this.rad += baseRad * (Math.random() < 0.5 ? 1 : -1);
  this.addedX = Math.cos(this.rad);
  this.addedY = Math.sin(this.rad);
  if (Math.random() < opts.dieChance ||
      this.x > dieX || this.x < -dieX ||
      this.y > dieY || this.y < -dieY)
    this.reset();
};

Line.prototype.step = function() {
  ++this.time;
  ++this.cumulativeTime;
  if (this.time >= this.targetTime) this.beginPhase();

  var prop  = this.time / this.targetTime;
  var wave  = Math.sin(prop * Math.PI / 2);
  var px    = w / 2 + (this.x + this.addedX * wave) * opts.len;
  var py    = h / 2 + (this.y + this.addedY * wave) * opts.len;

  var co    = this.color;
  var hue   = co.hue + 6 * Math.sin(this.cumulativeTime * 0.03);
  var light = co.baseLight + co.addedLight * Math.sin(this.cumulativeTime * this.lightMult);
  var col   = 'hsl(' + hue + ',' + co.sat + '%,' + light + '%)';

  ctx.shadowBlur = prop * opts.shadowMult;
  ctx.fillStyle  = ctx.shadowColor = col;
  ctx.fillRect(px, py, 2, 2);

  if (Math.random() < opts.sparkChance) {
    var sd = opts.sparkDist, ss = opts.sparkSize;
    ctx.fillRect(
      px + Math.random() * sd * (Math.random() < .5 ? 1 : -1) - ss / 2,
      py + Math.random() * sd * (Math.random() < .5 ? 1 : -1) - ss / 2,
      ss, ss
    );
  }
};

function loop() {
  requestAnimationFrame(loop);
  ++tick;

  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.fillStyle  = 'rgba(7,11,17,' + opts.repaintAlpha + ')';
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = 'lighter';

  if (lines.length < opts.count && Math.random() < opts.spawnChance)
    lines.push(new Line());

  lines.forEach(function(l) { l.step(); });
}

function setOpacity() {
  var v = +document.getElementById('slOpacity').value;
  document.getElementById('lblOpacity').textContent = (v / 100).toFixed(2);
  c.style.opacity = v / 100;
}

function rebuild() {
  var count = +document.getElementById('slCount').value;
  var glow  = +document.getElementById('slGlow').value;
  var fade  = +document.getElementById('slFade').value;
  var spd   = +document.getElementById('slSpeed').value;
  document.getElementById('lblCount').textContent = count;
  document.getElementById('lblGlow').textContent  = glow;
  document.getElementById('lblFade').textContent  = fade;
  document.getElementById('lblSpeed').textContent = spd;
  opts.count        = count;
  opts.shadowMult   = glow;
  opts.repaintAlpha = fade / 100;
  opts.baseTime     = Math.round(25 - spd);
  opts.addedTime    = Math.round(25 - spd);
  while (lines.length > opts.count) lines.pop();
}

window.addEventListener('resize', resize);
resize();
loop();
</script>
</body>
</html>
